  else{

    rows.forEach(function(ri){var r=SR[ri];var dk=r[0];if(!byDate[dk])byDate[dk]=[];byDate[dk].push(ri);});
    Object.keys(byDate).sort(function(a,b){return+a-+b;}).forEach(function(dk){
      h+='<div class="dh">'+esc(SD[dk])+'</div><table class="st"><thead><tr><th>Court</th><th>Home</th><th>Away</th></tr></thead><tbody>';
      byDate[dk].forEach(function(ri){
        var r=SR[ri];var isH=(r[2]===+lk);
        h+='<tr><td class="ct">'+esc(SC[r[1]]||'')+'</td><td class="'+(isH?'hi':'')+'">'+esc(ST[r[2]]||'')+'</td><td class="'+(!isH?'hi':'')+'">'+esc(ST[r[3]]||'')+'</td></tr>';
      });
      h+='</tbody></table>';
    });
  }
  h+='</div><div id="tpr'+ai+'" hidden>';
  if(plrs.length===0){h+='<div class="em">No roster data available.</div>';}
  else{
    var SROLES=['Head Coach','Assistant Coach','Team Representative','Team Manager','Director','Club Director'];
    var staff=[],ath=[];
    plrs.forEach(function(pi){(SROLES.indexOf(PLRS[pi][2])>=0?staff:ath).push(pi);});
    if(ath.length){h+='<table class="rt"><thead><tr><th>#</th><th>Name</th></tr></thead><tbody>';ath.forEach(function(pi){var p=PLRS[pi];h+='<tr><td class="nr">'+esc(p[2])+'</td><td>'+esc(p[1])+' '+esc(p[0])+'</td></tr>';});h+='</tbody></table>';}
    if(staff.length){h+='<div class="ss"><div class="ssl">Coaching Staff</div>';staff.forEach(function(pi){var p=PLRS[pi];h+='<div class="si2"><span>'+esc(p[1])+' '+esc(p[0])+'</span><span class="sr2">'+esc(p[2])+'</span></div>';});h+='</div>';}
  }
  h+='</div></div>';
  dv.innerHTML=h;dv.scrollIntoView({behavior:'smooth',block:'start'});
}
function stab(ai,tab){
  var s=document.getElementById('tps'+ai);var r=document.getElementById('tpr'+ai);
  var bs=document.getElementById('tbs'+ai);var br=document.getElementById('tbr'+ai);
  if(tab===0){s.hidden=false;r.hidden=true;bs.className='tab on';br.className='tab';}
  else{s.hidden=true;r.hidden=false;bs.className='tab';br.className='tab on';}
}
function showAthlete(pi){
  var p=PLRS[pi];var ti=p[3];var tm=ATMS[ti];
  document.getElementById('dd').hidden=true;
  var dv=document.getElementById('dv');dv.hidden=false;
  var h='<div class="dvi"><button class="back" onclick="goBack()">&#8592; Back</button>';
  h+='<div class="dvh"><div class="dvt">'+esc(p[2]||'Athlete')+'</div><h2>'+esc(p[1])+' '+esc(p[0])+'</h2>';
  if(tm)h+='<div class="dvs">'+esc(tm[1])+' &middot; '+esc(tm[2])+'</div>';
  h+='</div>';
  if(tm)h+='<button class="vtb" onclick="showTeam('+ti+')">View Team &rarr;</button>';
  h+='</div>';
  dv.innerHTML=h;dv.scrollIntoView({behavior:'smooth',block:'start'});
}
function goBack(){
  var dv=document.getElementById('dv');dv.hidden=true;
  document.getElementById('si').value='';
  document.getElementById('dd').hidden=true;
  window.scrollTo({top:0,behavior:'smooth'});
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
</script>
</body>
</html>
